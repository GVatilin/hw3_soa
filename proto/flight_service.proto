syntax = "proto3";

package flight;

import "google/protobuf/descriptor.proto";
import "google/protobuf/timestamp.proto";

enum BusinessGrpcErrorCode {
  UNSPECIFIED = 0;
  ERROR_INVALID_ARGUMENT = 1;
  ERROR_NOT_FOUND = 2;
  ERROR_RESOURCE_EXHAUSTED = 3;
  ERROR_FAILED_PRECONDITION = 4;
  ERROR_UNAUTHENTICATED = 5;
}

extend google.protobuf.MethodOptions {
  repeated BusinessGrpcErrorCode business_errors = 50001;
}

enum FlightStatus {
  FLIGHT_STATUS_UNSPECIFIED = 0;
  SCHEDULED = 1;
  DEPARTED = 2;
  CANCELLED = 3;
  COMPLETED = 4;
}

enum ReservationStatus {
  RESERVATION_STATUS_UNSPECIFIED = 0;
  ACTIVE = 1;
  RELEASED = 2;
  EXPIRED = 3;
}

message Flight {
  string id = 1;
  string flight_number = 2;
  string airline_code = 3;
  string origin = 4;
  string destination = 5;
  google.protobuf.Timestamp departure_time = 6;
  google.protobuf.Timestamp arrival_time = 7;
  int32 total_seats = 8;
  int32 available_seats = 9;
  string price = 10;
  FlightStatus status = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message SearchFlightsRequest {
  string origin = 1;
  string destination = 2;
  google.protobuf.Timestamp departure_date = 3; // optional
}

message SearchFlightsResponse {
  repeated Flight flights = 1;
}

message GetFlightRequest {
  string flight_id = 1;
}

message ReserveSeatsRequest {
  string flight_id = 1;
  string booking_id = 2;
  int32 seat_count = 3;
}

message ReserveSeatsResponse {
  string reservation_id = 1;
  string flight_id = 2;
  string booking_id = 3;
  int32 seat_count = 4;
  ReservationStatus status = 5;
}

message ReleaseReservationRequest {
  string booking_id = 1;
}

message ReleaseReservationResponse {
  string reservation_id = 1;
  string booking_id = 2;
  string flight_id = 3;
  int32 released_seats = 4;
  ReservationStatus status = 5;
}

service FlightService {
  rpc SearchFlights(SearchFlightsRequest) returns (SearchFlightsResponse) {
    option (business_errors) = ERROR_INVALID_ARGUMENT;
  }
  rpc GetFlight(GetFlightRequest) returns (Flight) {
    option (business_errors) = ERROR_NOT_FOUND;
    option (business_errors) = ERROR_INVALID_ARGUMENT;
  }
  rpc ReserveSeats(ReserveSeatsRequest) returns (ReserveSeatsResponse) {
    option (business_errors) = ERROR_NOT_FOUND;
    option (business_errors) = ERROR_INVALID_ARGUMENT;
    option (business_errors) = ERROR_RESOURCE_EXHAUSTED;
    option (business_errors) = ERROR_FAILED_PRECONDITION;
    option (business_errors) = ERROR_UNAUTHENTICATED;
  }
  rpc ReleaseReservation(ReleaseReservationRequest) returns (ReleaseReservationResponse) {
    option (business_errors) = ERROR_NOT_FOUND;
    option (business_errors) = ERROR_INVALID_ARGUMENT;
    option (business_errors) = ERROR_FAILED_PRECONDITION;
    option (business_errors) = ERROR_UNAUTHENTICATED;
  }
}
